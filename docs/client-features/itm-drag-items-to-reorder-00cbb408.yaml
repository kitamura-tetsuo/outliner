id: ITM-00cbb408
title: Drag items to reorder
description: Items can be reordered by dragging the drag handle (the bullet dot or collapse chevron on the left of the item). Dragging over the item text selects text instead, like a text editor.
category: item-management
status: implemented
acceptance:
- Drag visual effects (dragging style, drop indicators) are cleared when the drag ends
- Dragging over the item text does not start an item move; it selects text
- Items can be moved by dragging the left drag handle (bullet/chevron)
tests:
- client/e2e/core/itm-drag-items-to-reorder-00cbb408.spec.ts
- client/e2e/core/itm-drag-text-selects-instead-of-move-00cbb408.spec.ts
title-ja: ドラッグでアイテムを移動
