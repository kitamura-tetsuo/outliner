    groups:
      typescript-and-lint:
        patterns:
          - "typescript"
          - "*eslint*"
          - "@typescript-eslint/*"
          - "prettier"
          - "*prettier*"
      svelte-core:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "vite"

