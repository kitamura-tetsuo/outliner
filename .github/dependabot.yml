version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '13:00' # UTC. Equivalent to 22:00 JST
    open-pull-requests-limit: 10
    rebase-strategy: 'auto'
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      typescript-and-lint:
        patterns:
          - "typescript"
          - "*eslint*"
          - "@typescript-eslint/*"
          - "prettier"
          - "*prettier*"

  - package-ecosystem: 'npm'
    directory: '/client'
    schedule:
      interval: 'weekly'
      time: '13:00' # UTC. Equivalent to 22:00 JST
    open-pull-requests-limit: 10
    rebase-strategy: 'auto'
    labels:
