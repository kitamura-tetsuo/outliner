<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Clipboard API Test</title>
        <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .test-section {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
        }
        button {
            padding: 8px 16px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #f8f8f8;
            border-radius: 4px;
            min-height: 20px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        .log-container {
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
            background-color: #f8f8f8;
            max-height: 200px;
            overflow-y: auto;
        }
        </style>
    </head>
    <body>
        <h1>Clipboard API Test</h1>
        <p>This page is for testing the Clipboard API.</p>

        <div class="container">
            <div class="test-section">
                <h2>1. navigator.clipboard API Test</h2>
                <textarea id="clipboard-text" placeholder="Enter text to copy here"></textarea>
                <div>
                    <button id="copy-btn">Copy</button>
                    <button id="paste-btn">Paste</button>
                </div>
                <div class="result" id="clipboard-result"></div>
            </div>

            <div class="test-section">
                <h2>2. document.execCommand API Test</h2>
                <textarea id="execcommand-text" placeholder="Enter text to copy here"></textarea>
                <div>
                    <button id="execcommand-copy-btn">Copy</button>
                    <button id="execcommand-paste-btn">Paste</button>
                </div>
                <div class="result" id="execcommand-result"></div>
            </div>

            <div class="test-section">
                <h2>3. Clipboard Permission Test</h2>
                <button id="check-permission-btn">Check Clipboard Permission</button>
                <div class="result" id="permission-result"></div>
            </div>

            <div class="test-section">
                <h2>4. For Playwright Tests</h2>
                <textarea id="playwright-text" placeholder="Text from Playwright will appear here"></textarea>
                <div>
                    <button id="playwright-copy-btn">Copy</button>
                    <button id="playwright-paste-btn">Paste</button>
                </div>
                <div class="result" id="playwright-result"></div>
            </div>
        </div>

        <div class="log-container">
            <h3>Log</h3>
            <div id="log"></div>
        </div>

        <script>
        // Log function
            function log(message) {
                const logElement = document.getElementById("log");
                const logItem = document.createElement("div");
                logItem.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
                logElement.appendChild(logItem);
                console.log(message);
            }

            // Result display function
            function showResult(elementId, message, isSuccess = true) {
                const resultElement = document.getElementById(elementId);
                resultElement.textContent = message;
                resultElement.className = "result " + (isSuccess ? "success" : "error");
            }

            // 1. navigator.clipboard API Test
            document.getElementById("copy-btn").addEventListener("click", async () => {
                try {
                    const text = document.getElementById("clipboard-text").value;
                    await navigator.clipboard.writeText(text);
                    showResult("clipboard-result", "Copy successful: " + text);
                    log("navigator.clipboard.writeText successful: " + text);
                }
                catch (err) {
                    showResult("clipboard-result", "Copy failed: " + err.message, false);
                    log("navigator.clipboard.writeText failed: " + err.message);
                }
            });

            document.getElementById("paste-btn").addEventListener("click", async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    document.getElementById("clipboard-text").value = text;
                    showResult("clipboard-result", "Paste successful: " + text);
                    log("navigator.clipboard.readText successful: " + text);
                }
                catch (err) {
                    showResult("clipboard-result", "Paste failed: " + err.message, false);
                    log("navigator.clipboard.readText failed: " + err.message);
                }
            });

            // 2. document.execCommand API Test
            document.getElementById("execcommand-copy-btn").addEventListener("click", () => {
                try {
                    const textarea = document.getElementById("execcommand-text");
                    textarea.select();
                    const success = document.execCommand("copy");
                    if (success) {
                        showResult("execcommand-result", "Copy successful: " + textarea.value);
                        log('document.execCommand("copy") successful: ' + textarea.value);
                    }
                    else {
                        showResult("execcommand-result", "Copy failed", false);
                        log('document.execCommand("copy") Failed');
                    }
                }
                catch (err) {
                    showResult("execcommand-result", "Copy failed: " + err.message, false);
                    log('document.execCommand("copy") failed: ' + err.message);
                }
            });

            document.getElementById("execcommand-paste-btn").addEventListener("click", () => {
                try {
                    const textarea = document.getElementById("execcommand-text");
                    textarea.focus();
                    const success = document.execCommand("paste");
                    if (success) {
                        showResult("execcommand-result", "Paste successful: " + textarea.value);
                        log('document.execCommand("paste") successful: ' + textarea.value);
                    }
                    else {
                        showResult("execcommand-result", "Paste failed", false);
                        log('document.execCommand("paste") Failed');
                    }
                }
                catch (err) {
                    showResult("execcommand-result", "Paste failed: " + err.message, false);
                    log('document.execCommand("paste") failed: ' + err.message);
                }
            });

            // 3. Clipboard Permission Test
            document.getElementById("check-permission-btn").addEventListener("click", async () => {
                try {
                    if (!navigator.permissions) {
                        showResult(
                            "permission-result",
                            "navigator.permissions API is not supported",
                            false,
                        );
                        log("navigator.permissions API is not supported");
                        return;
                    }

                    const clipboardRead = await navigator.permissions.query({ name: "clipboard-read" });
                    const clipboardWrite = await navigator.permissions.query({ name: "clipboard-write" });

                    showResult(
                        "permission-result",
                        `clipboard-read: ${clipboardRead.state}, clipboard-write: ${clipboardWrite.state}`,
                    );
                    log(`clipboard-read: ${clipboardRead.state}, clipboard-write: ${clipboardWrite.state}`);
                }
                catch (err) {
                    showResult("permission-result", "Permission check failed: " + err.message, false);
                    log("Permission check failed: " + err.message);
                }
            });

            // 4. For Playwright Tests
            document.getElementById("playwright-copy-btn").addEventListener("click", async () => {
                try {
                    const text = document.getElementById("playwright-text").value;
                    await navigator.clipboard.writeText(text);
                    showResult("playwright-result", "Copy successful: " + text);
                    log("Playwright copy successful: " + text);
                    // Save to global variable (for testing)
                    window.lastCopiedText = text;
                }
                catch (err) {
                    showResult("playwright-result", "Copy failed: " + err.message, false);
                    log("Playwright copy failed: " + err.message);
                }
            });

            document.getElementById("playwright-paste-btn").addEventListener("click", async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    document.getElementById("playwright-text").value = text;
                    showResult("playwright-result", "Paste successful: " + text);
                    log("Playwright paste successful: " + text);
                    // Save to global variable (for testing)
                    window.lastPastedText = text;
                }
                catch (err) {
                    showResult("playwright-result", "Paste failed: " + err.message, false);
                    log("Playwright paste failed: " + err.message);
                }
            });

            // Execute on page load
            window.addEventListener("load", () => {
                log("Page loaded");
                // Check clipboard API support status
                if (navigator.clipboard) {
                    log("navigator.clipboard API is supported");
                }
                else {
                    log("navigator.clipboard API is not supported");
                }
            });
        </script>
    </body>
</html>
